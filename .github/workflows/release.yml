name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  # ============ 桌面端：mac universal / Windows ============
  # mac 用 universal binary：一份 .dmg 同时支持 arm + Intel，
  # 避开 macos-13 Intel runner 紧张排队的问题。
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: universal-apple-darwin
            artifact_name: macos-universal
            bundles: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            bundles: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin 需要同时装 arm64 和 x86_64 两个 target
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.bundles }}" ]; then
            pnpm tauri build --target ${{ matrix.target }} ${{ matrix.bundles }}
          else
            pnpm tauri build --target ${{ matrix.target }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  # ============ Android ============
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve pre-installed NDK
        id: ndk
        run: |
          # ubuntu-22.04 runner 预装了多个 NDK，挑一个 27.x
          NDK_DIR=$(ls -d "${ANDROID_HOME}/ndk/27."* 2>/dev/null | head -1 || true)
          if [ -z "$NDK_DIR" ]; then
            NDK_DIR=$(ls -d "${ANDROID_HOME}/ndk/"* 2>/dev/null | head -1)
          fi
          if [ -z "$NDK_DIR" ]; then
            echo "No NDK found under $ANDROID_HOME/ndk/" >&2
            ls -la "${ANDROID_HOME}/ndk/" >&2 || true
            exit 1
          fi
          echo "ndk_home=$NDK_DIR" >> "$GITHUB_OUTPUT"
          echo "Using NDK: $NDK_DIR"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Init Android project
        run: pnpm tauri android init
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk_home }}

      - name: Override default Tauri launcher icons with custom icons
        run: |
          # tauri android init 模板里默认 mipmap-* 是 Tauri 默认图标，必须显式覆盖
          cp -r src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Inject signing config & ABI splits
        run: |
          cp .github/android/debug.keystore src-tauri/gen/android/app/keystore.keystore
          cp .github/android/customizations.gradle src-tauri/gen/android/app/customizations.gradle
          printf '\napply(from = "customizations.gradle")\n' >> src-tauri/gen/android/app/build.gradle.kts

      - name: Build Android APK
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk_home }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-android
          if-no-files-found: error
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ============ 发布 GitHub Release ============
  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          find artifacts -type f | sort | sed 's/^/ - /' >> $GITHUB_STEP_SUMMARY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.apk
            artifacts/**/*.exe
