// 通过 apply from: 注入到 Tauri 生成的 gen/android/app/build.gradle.kts
// 1. 用项目内置 keystore 签 release（与 debug 同一份，个人项目简化）
// 2. 按 ABI 拆包，避免 universal APK 重复打包 4 份 Rust native 库

android {
    signingConfigs {
        release {
            storeFile file("keystore.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
            universalApk true
        }
    }
}
